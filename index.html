<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workcosmo Space</title>
  <meta name="description" content="Unified Workcosmo login, company dashboard, and product launcher." />
  <link rel="icon" type="image/png" href="https://workcosmo.in/app/assets/images/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="space-shell">
    <section id="login-view" class="login-layout">
      <div class="brand-panel">
        <a href="https://workcosmo.in" class="brand-lockup">
          <img src="https://workcosmo.in/src/images/ngu_logo.png" alt="Workcosmo" />
          <span>Workcosmo Space</span>
        </a>
        <div class="brand-copy">
          <p class="eyebrow">Company Operating System</p>
          <h1>Enter your Space.</h1>
          <p>One identity layer for Hire, Core, and Perform.</p>
        </div>
      </div>

      <form id="login-form" class="login-card">
        <div>
          <p class="eyebrow">Unified Login</p>
          <h2>Welcome back</h2>
        </div>

        <label>
          <span>Client ID</span>
          <input id="client-id" type="text" name="clientId" autocomplete="off" placeholder="client id" />
        </label>

        <label>
          <span>Email</span>
          <input id="email" type="email" name="email" autocomplete="username" placeholder="name@company.com" />
        </label>

        <label>
          <span>Password</span>
          <input id="password" type="password" name="password" autocomplete="current-password" placeholder="Password" />
        </label>

        <button type="submit">Enter Space</button>
        <button id="reset-password" type="button" class="link-button">
          Send password reset
        </button>
        <p id="login-error" class="feedback hidden"></p>
      </form>
    </section>

    <section id="dashboard-view" class="dashboard hidden">
      <div class="dashboard-top-bar">
        <a href="https://workcosmo.in" class="brand-lockup compact dashboard-brand">
          <img src="https://workcosmo.in/src/images/ngu_logo.png" alt="Workcosmo" />
          <span>Workcosmo Space</span>
        </a>
        <button id="sign-out" type="button" class="top-bar-button">
          <i class="fas fa-arrow-right-from-bracket"></i>
          Sign out
        </button>
      </div>

      <div class="dashboard-main">
        <div class="dashboard-scroll">
          <header class="dashboard-hero">
            <div class="hero-copy">
              <p class="eyebrow hero-eyebrow" id="greeting">Good morning</p>
              <h2 id="welcome-title">Welcome back</h2>
              <p class="hero-subtitle" id="user-email">user@example.com</p>
            </div>
            <div class="hero-badge">
              <span class="status-pill" id="status">active</span>
            </div>
          </header>

          <section class="dashboard-stats" aria-label="Workspace overview">
            <article class="stat-card stat-card--blue">
              <div class="stat-icon"><i class="fas fa-building"></i></div>
              <div>
                <p class="stat-label">Workspace</p>
                <p class="stat-value" id="company-name-card">Workspace</p>
              </div>
            </article>
            <article class="stat-card stat-card--green">
              <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
              <div>
                <p class="stat-label">Status</p>
                <p class="stat-value" id="status-stat">active</p>
              </div>
            </article>
            <article class="stat-card stat-card--orange">
              <div class="stat-icon"><i class="fas fa-puzzle-piece"></i></div>
              <div>
                <p class="stat-label">Active Modules</p>
                <p class="stat-value" id="modules-count">0</p>
              </div>
            </article>
          </section>
        </div>
      </div>

      <div class="dashboard-dock">
        <div id="modules-dock" class="modules-dock"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./src/space.js"></script>
</body>

</html>
